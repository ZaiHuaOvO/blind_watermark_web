name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (OpenCV)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libglib2.0-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx aiofiles

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/ tests/

      - name: Test with pytest
        run: |
          ACCESS_KEY=test-key pytest -q tests/

      - name: Test application startup
        run: |
          pip install uvicorn
          ACCESS_KEY=test-key timeout 15 uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 4
          curl -f http://127.0.0.1:8000/?key=test-key -o /dev/null
          # 验证无 key 请求被拒绝
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "http://127.0.0.1:8000/api/watermark/embed?key=wrong")
          if [ "$HTTP_CODE" != "403" ]; then
            echo "Expected 403 but got $HTTP_CODE"
            exit 1
          fi
          echo "Access key check passed (got 403 as expected)"
          kill %1 2>/dev/null || true
