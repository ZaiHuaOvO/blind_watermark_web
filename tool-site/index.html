<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>再花的工具箱</title>
  <link rel="icon" href="https://api.flowersink.com/img/%E7%B2%89%E6%AF%9B%E7%8C%AB%E7%8C%AB%E5%A4%B4.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="feature-modal/modal.css">
</head>

<body>

  <!-- ═══ 花瓣容器 ═══ -->
  <div id="petalContainer"></div>

  <!-- ═══ 背景装饰 ═══ -->
  <div class="bg-shapes">
    <div class="bg-shape"></div>
    <div class="bg-shape"></div>
    <div class="bg-shape"></div>
    <div class="bg-shape"></div>
  </div>

  <!-- ═══ 主内容 ═══ -->
  <div class="container">
    <header data-aos="fade-down" data-aos-delay="100">
      <div class="avatar-wrap">
        <div class="avatar">
          <img src="https://api.flowersink.com/img/%E7%B2%89%E6%AF%9B%E7%8C%AB%E7%8C%AB%E5%A4%B4.jpeg" alt="avatar">
        </div>
      </div>
      <h1>再花的工具箱</h1>
      <p>一些有趣又实用的小工具 ✨</p>
    </header>

    <!-- ═══ 信息横条（博客 + 关于） ═══ -->
    <div class="info-strip-wrap" data-aos="fade-up" data-aos-delay="100">
      <div class="info-strip">
        <a href="https://flowersink.com/" class="info-item" title="再花の博客">
          <span class="info-icon">🌸</span>
          <span>再花の博客</span>
        </a>
        <span class="info-sep"></span>
        <a href="javascript:void(0)" class="info-item about-trigger" title="关于工具箱">
          <span class="info-icon">🧰</span>
          <span>关于工具箱</span>
        </a>
      </div>
    </div>

    <div class="tool-grid">
      <!-- 盲水印 -->
      <div class="tool-card tool-card--disabled" data-aos="fade-up" data-aos-delay="200">
        <div class="corner-flap">
          <a href="https://github.com/ZaiHuaOvO/blind_watermark_web" target="_blank" class="corner-github"
            onclick="event.stopPropagation();" title="GitHub 仓库">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z" />
            </svg>
          </a>
        </div>
        <span class="icon">🔒</span>
        <div class="name">盲水印</div>
        <div class="desc">为图片嵌入不可见的文字水印</div>
        <div class="bwm-tag-stack">
          <div class="bwm-tag-row"><span class="tag tag-coming">待整修</span><span class="tag tag-key">需要密钥</span></div>
          <p style="margin:0;font-size:0.68rem;color:#c0a0a0;line-height:1.2;">开发失败了对不起T^T</p>
          <span class="feature-link" onclick="event.stopPropagation(); openFeature('blind-watermark')">功能介绍</span>
        </div>
      </div>
      <!-- 九宫格 -->
      <div class="tool-card" onclick="window.location.href='/nine-grid'" data-aos="fade-up" data-aos-delay="300">
        <div class="corner-flap">
          <a href="https://github.com/ZaiHuaOvO/nine_grid" target="_blank" class="corner-github"
            onclick="event.stopPropagation();" title="GitHub 仓库">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z" />
            </svg>
          </a>
        </div>
        <span class="icon">🔲</span>
        <div class="name">九宫格</div>
        <div class="desc">将一张图切分成九宫格拼图</div>
        <div class="bwm-tag-stack">
          <div class="bwm-tag-row"><span class="tag tag-ready">可用</span></div><span class="feature-link"
            onclick="event.stopPropagation(); openFeature('nine-grid')">功能介绍</span>
        </div>
      </div>

      <!-- 云效助手 -->
      <div class="tool-card" data-aos="fade-up" data-aos-delay="250">
        <span class="icon">☁️</span>
        <div class="name">云效助手</div>
        <div class="desc">工作项日报 &amp; 查询工具</div>
        <div class="bwm-tag-stack">
          <div class="bwm-tag-row"><span class="tag tag-key">仅再花可用</span></div>
          <span class="feature-link" onclick="event.stopPropagation(); openFeature('aliyun')">功能介绍</span>
        </div>
      </div>

    </div>

    <footer data-aos="fade-up" data-aos-delay="500">
      <p>所有工具均为原创/基于开源项目开发</p>
      <p>所有操作均尽可能在客户端完成</p>
      <p>&copy; 2026 <a href="https://github.com/ZaiHuaOvO" target="_blank">再花</a>. All rights reserved.</p>
      <p class="footer-icp">
        <a href="https://beian.miit.gov.cn/" target="_blank">蜀ICP备2024104191号</a>
      </p>
    </footer>
  </div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="script.js"></script>
  <script src="feature-modal/modal.js"></script>

  <!-- ═══ 功能介绍弹窗 ═══ -->
  <div class="modal-overlay" id="featureModal" onclick="closeFeature()">
    <div class="modal-card" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeFeature()">&times;</button>
      <div class="modal-body" id="featureContent"></div>
    </div>
  </div>
</body>

</html>
