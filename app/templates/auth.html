<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问验证 - Blind Watermark Web</title>
    <link rel="icon" href="https://api.flowersink.com/img/%E7%B2%89%E6%AF%9B%E7%8C%AB%E7%8C%AB%E5%A4%B4.jpeg">
    <link rel="stylesheet" href="/static/css/bwm-theme.css">
    <style>
        .auth-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-card {
            width: 100%;
            max-width: 380px;
            background: var(--bwm-surface-solid, #fff);
            border: 1px solid var(--bwm-border, #d0c0b0);
            border-radius: var(--bwm-radius-xl, 20px);
            box-shadow: var(--bwm-shadow, 0 4px 18px rgba(142,98,68,0.06));
            padding: 32px;
        }

        .auth-card h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--bwm-brown, #4a3728);
            margin: 0 0 8px;
        }

        .auth-card p {
            font-size: 13px;
            color: var(--bwm-brown-light, #8a7a6a);
            margin: 0 0 24px;
        }

        .auth-input {
            width: 100%;
            height: 36px;
            padding: 0 12px;
            border: 1px solid var(--bwm-border-strong, #d0c0b0);
            border-radius: 10px;
            background: #fff;
            color: var(--bwm-brown, #4a3728);
            font-family: var(--bwm-font, 'Quicksand','Noto Sans SC',sans-serif);
            font-size: 14px;
            outline: none;
            transition: border-color 0.16s, box-shadow 0.16s;
        }

        .auth-input:focus {
            border-color: #ffb5c5;
            box-shadow: 0 0 0 3px rgba(255,181,197,0.3);
        }

        .auth-btn {
            width: 100%;
            height: 36px;
            border: none;
            border-radius: 10px;
            margin-top: 12px;
            background: #ffb5c5;
            color: #fff;
            font-family: var(--bwm-font, 'Quicksand','Noto Sans SC',sans-serif);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.16s;
        }

        .auth-btn:hover { opacity: 0.85; }

        .auth-error {
            font-size: 13px;
            color: #b54a3a;
            margin-top: 12px;
        }
    </style>
</head>

<body class="auth-page">
    <div class="auth-card">
        <h1>盲水印</h1>
        <p>需要输入密钥才可以使用哦</p>
        <div style="margin-bottom:var(--fi-space-4)">
            <input type="password" class="auth-input" id="keyInput" placeholder="输入密钥" autofocus>
        </div>
        <button class="auth-btn" id="authBtn">验证</button>
        <div class="auth-error" id="errorMsg"></div>
    </div>
    <script>
        document.getElementById('keyInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') submit();
        });
        document.getElementById('authBtn').addEventListener('click', submit);
        async function submit() {
            var key = document.getElementById('keyInput').value.trim();
            if (!key) return;
            var btn = document.getElementById('authBtn');
            btn.disabled = true;
            btn.textContent = '验证中...';
            try {
                var resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'key=' + encodeURIComponent(key)
                });
                if (resp.ok) {
                    window.location.href = '/blind-watermark';
                } else {
                    document.getElementById('errorMsg').textContent = '密钥无效';
                    btn.disabled = false;
                    btn.textContent = '验证';
                }
            } catch (e) {
                document.getElementById('errorMsg').textContent = '请求失败';
                btn.disabled = false;
                btn.textContent = '验证';
            }
        }
    </script>
</body>

</html>
